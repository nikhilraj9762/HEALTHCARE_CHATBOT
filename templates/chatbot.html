<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Healthcare Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            min-height: 100vh;
            color: white;
            line-height: 1.6;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .chatbot-page-wrapper {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.30);
            padding: 34px 18px 44px;
        }

        .chatbot-page-container {
            width: 100%;
            max-width: 1700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.30);
            padding: 28px;
        }

        .chatbot-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .chatbot-topbar h2 {
            margin: 0;
            font-size: clamp(1.85rem, 2.5vw, 2.55rem);
            font-weight: bold;
            color: white;
            flex: 1;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            padding: 13px 20px;
            border-radius: 12px;
            background: #111827;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s;
            white-space: nowrap;
            font-size: 16px;
        }

        .back-btn:hover {
            background: #1f2937;
        }

        .voice-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .voice-toggle-box {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e5e7eb;
        }

        .voice-label {
            font-size: 19px;
            font-weight: 600;
        }

        .chat-box {
            height: 65vh;
            min-height: 560px;
            max-height: 72vh;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .message {
            max-width: 78%;
            padding: 17px 20px;
            margin-bottom: 16px;
            border-radius: 18px;
            line-height: 1.66;
            font-size: 17px;
            word-wrap: break-word;
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.10);
            color: white;
            align-self: flex-start;
        }

        .user-message {
            background: #2563eb;
            color: white;
            margin-left: auto;
        }

        .chat-input-container {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }

        #userInput {
            flex: 1;
            min-width: 260px;
            padding: 17px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 17px;
            outline: none;
        }

        #userInput::placeholder {
            color: #cbd5e1;
        }

        .mic-btn,
        #sendBtn {
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mic-btn {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .mic-btn:hover {
            background: rgba(255,255,255,0.16);
        }

        .mic-icon {
            width: 26px;
            height: 26px;
            fill: #000000;
        }

        #sendBtn {
            padding: 17px 26px;
            background: #14b8a6;
            color: white;
            font-size: 17px;
            font-weight: 600;
        }

        #sendBtn:hover {
            background: #0f9f90;
        }

        .chat-note {
            margin-top: 18px;
            text-align: center;
            color: #cbd5e1;
            font-size: 16px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 30px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(255,255,255,0.20);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .switch input:checked + .slider {
            background-color: #14b8a6;
        }

        .switch input:checked + .slider:before {
            transform: translateX(26px);
        }

        @media (max-width: 768px) {
            .chatbot-page-wrapper {
                padding: 20px 12px 30px;
            }

            .chatbot-page-container {
                padding: 18px;
            }

            .chatbot-topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .chatbot-topbar h2 {
                text-align: center;
                font-size: 1.6rem;
            }

            .voice-controls {
                justify-content: center;
            }

            .chat-box {
                height: 58vh;
                min-height: 380px;
            }

            .message {
                max-width: 90%;
                font-size: 15px;
                line-height: 1.6;
            }

            .chat-input-container {
                flex-direction: column;
                align-items: stretch;
            }

            .mic-btn,
            #sendBtn,
            #userInput {
                width: 100%;
            }
        }
        body.light-mode {
    background: linear-gradient(135deg, #f8fafc, #e2e8f0, #ffffff);
    background-size: 300% 300%;
    color: #111827;
}

body.light-mode .chatbot-page-wrapper {
    background: rgba(255, 255, 255, 0.45);
}

body.light-mode .chatbot-page-container {
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(15, 23, 42, 0.08);
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.10);
}

body.light-mode .chatbot-topbar h2,
body.light-mode .chat-note,
body.light-mode .voice-label {
    color: #111827;
}

body.light-mode .back-btn {
    background: #e2e8f0;
    color: #111827;
    border: 1px solid rgba(15, 23, 42, 0.08);
}

body.light-mode .back-btn:hover {
    background: #cbd5e1;
}

body.light-mode .chat-box {
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(15, 23, 42, 0.08);
}

body.light-mode .bot-message {
    background: #e2e8f0;
    color: #111827;
}

body.light-mode .user-message {
    background: #14b8a6;
    color: white;
}

body.light-mode #userInput {
    background: white;
    color: #111827;
    border: 1px solid rgba(15, 23, 42, 0.10);
}

body.light-mode #userInput::placeholder {
    color: #64748b;
}

body.light-mode #sendBtn,
body.light-mode .mic-btn {
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
}

body.light-mode .voice-toggle-box {
    background: rgba(255, 255, 255, 0.75);
    border: 1px solid rgba(15, 23, 42, 0.08);
}
    </style>
</head>
<body>
    <div class="chatbot-page-wrapper">
        <div class="chatbot-page-container">

            <div class="chatbot-topbar">
                <a href="/dashboard" class="back-btn">&#8592; Back</a>
                <h2>AI Healthcare Chatbot</h2>
                <div style="width: 92px;"></div>
            </div>

            <div class="voice-controls top-voice-only">
                <div class="voice-toggle-box">
                    <span class="voice-label">Voice Output</span>
                    <label class="switch">
                        <input type="checkbox" id="voiceToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="chat-box" id="chatMessages">
                <div class="message bot-message">
                    Hello! I am your AI healthcare assistant.
                    You can type or speak your request.
                </div>
            </div>

            <div class="chat-input-container">
                <input type="text" id="userInput" placeholder="Type your message here...">

                <button id="micBtn" class="mic-btn" title="Speak" aria-label="Speak">
                    <svg viewBox="0 0 24 24" class="mic-icon" aria-hidden="true">
                        <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.07A7 7 0 0 1 5 12a1 1 0 1 1 2 0 5 5 0 0 0 10 0z"/>
                    </svg>
                </button>

                <button id="sendBtn">Send</button>
            </div>

            <div class="chat-note">
                Try: I have fever and body pain / Set reminder / Dentist near me
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

<script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
