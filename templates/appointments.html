<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            min-height: 100vh;
            color: white;
            line-height: 1.6;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            transition: background 0.35s ease, color 0.35s ease;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page-wrapper {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.30);
            padding: 34px 18px 44px;
            transition: background 0.35s ease;
        }

        .page-container {
            width: 100%;
            max-width: 1700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.30);
            padding: 28px;
            transition: background 0.35s ease, border 0.35s ease, box-shadow 0.35s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
            margin-bottom: 26px;
        }

        .top-bar h1 {
            margin: 0;
            font-size: clamp(1.85rem, 2.5vw, 2.55rem);
            font-weight: bold;
            color: white;
            flex: 1;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            padding: 13px 20px;
            border-radius: 12px;
            background: #111827;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s;
            white-space: nowrap;
            cursor: pointer;
            font-size: 16px;
        }

        .back-btn:hover {
            background: #1f2937;
        }

        .add-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: #14b8a6;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: #0f9f90;
        }

        #appointmentsList {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            padding: 24px;
            min-height: 260px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.20);
            transition: background 0.35s ease, border 0.35s ease, box-shadow 0.35s ease;
        }

        .card p {
            margin: 11px 0;
            font-size: 17px;
            color: #dbe4ee;
            line-height: 1.66;
        }

        .actions {
            display: flex;
            gap: 14px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .actions button {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            color: white;
        }

        .edit-btn {
            background: #f59e0b;
        }

        .edit-btn:hover {
            background: #d97706;
        }

        .delete-btn {
            background: #ef4444;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .empty-text {
            font-size: 20px;
            color: #cbd5e1;
            padding: 12px 4px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-content {
            width: 100%;
            max-width: 620px;
            background: #111827;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.35);
            transition: background 0.35s ease, border 0.35s ease, box-shadow 0.35s ease;
        }

        .modal-content h2 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 30px;
            color: white;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 15px 16px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 17px;
            outline: none;
        }

        .modal-content input::placeholder {
            color: #cbd5e1;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .save-btn,
        .cancel-btn {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 17px;
            transition: 0.3s;
        }

        .save-btn {
            background: #14b8a6;
            color: white;
        }

        .save-btn:hover {
            background: #0f9f90;
        }

        .cancel-btn {
            background: rgba(255,255,255,0.10);
            color: white;
            border: 1px solid rgba(255,255,255,0.10);
        }

        .cancel-btn:hover {
            background: rgba(255,255,255,0.18);
        }

        /* LIGHT MODE */
        body.light-mode {
            background: linear-gradient(135deg, #f8fafc, #e2e8f0, #ffffff);
            background-size: 300% 300%;
            color: #111827;
        }

        body.light-mode .page-wrapper {
            background: rgba(255, 255, 255, 0.40);
        }

        body.light-mode .page-container {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.10);
        }

        body.light-mode .top-bar h1,
        body.light-mode .empty-text {
            color: #111827;
        }

        body.light-mode .back-btn {
            background: #e2e8f0;
            color: #111827;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        body.light-mode .back-btn:hover {
            background: #cbd5e1;
        }

        body.light-mode .card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
        }

        body.light-mode .card p {
            color: #111827;
        }

        body.light-mode .modal {
            background: rgba(15, 23, 42, 0.25);
        }

        body.light-mode .modal-content {
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
        }

        body.light-mode .modal-content h2 {
            color: #111827;
        }

        body.light-mode .modal-content input {
            background: white;
            color: #111827;
            border: 1px solid rgba(15, 23, 42, 0.12);
        }

        body.light-mode .modal-content input::placeholder {
            color: #64748b;
        }

        body.light-mode .cancel-btn {
            background: #e2e8f0;
            color: #111827;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        body.light-mode .cancel-btn:hover {
            background: #cbd5e1;
        }

        @media (max-width: 1400px) {
            #appointmentsList {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .top-bar h1 {
                text-align: center;
                font-size: 1.6rem;
            }

            #appointmentsList {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .card {
                min-height: 200px;
                padding: 18px;
            }

            .card p {
                font-size: 15px;
                line-height: 1.62;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="page-container">

            <div class="top-bar">
                <a href="/dashboard" class="back-btn">&#8592; Back</a>
                <h1>Appointments</h1>
                <button class="add-btn" onclick="openModal()">+ Add Appointment</button>
            </div>

            <div id="appointmentsList"></div>

        </div>
    </div>

    <div class="modal" id="appointmentModal">
        <div class="modal-content">
            <h2 id="formTitle">Add Appointment</h2>

            <input type="hidden" id="appointmentId">
            <input type="text" id="doctor" placeholder="Doctor Name">
            <input type="text" id="hospital" placeholder="Hospital Name">
            <input type="date" id="date">
            <input type="time" id="time">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="purpose" placeholder="Purpose">

            <div class="modal-buttons">
                <button class="save-btn" onclick="saveAppointment()">Save</button>
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let editing = false;

        async function loadAppointments() {
            const response = await fetch('/get_appointments');
            const data = await response.json();

            const list = document.getElementById('appointmentsList');
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = '<p class="empty-text">No appointments added yet.</p>';
                return;
            }

            data.forEach(appt => {
                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
                    <p><strong>Doctor:</strong> ${appt.doctor}</p>
                    <p><strong>Hospital:</strong> ${appt.hospital}</p>
                    <p><strong>Date:</strong> ${appt.date}</p>
                    <p><strong>Time:</strong> ${appt.time}</p>
                    <p><strong>Location:</strong> ${appt.location}</p>
                    <p><strong>Purpose:</strong> ${appt.purpose}</p>
                    <div class="actions">
                        <button class="edit-btn" onclick='editAppointment(${JSON.stringify(appt)})'>Edit</button>
                        <button class="delete-btn" onclick='deleteAppointment(${appt.id})'>Delete</button>
                    </div>
                `;

                list.appendChild(card);
            });
        }

        function openModal() {
            editing = false;
            document.getElementById('formTitle').innerText = 'Add Appointment';
            document.getElementById('appointmentId').value = '';
            document.getElementById('doctor').value = '';
            document.getElementById('hospital').value = '';
            document.getElementById('date').value = '';
            document.getElementById('time').value = '';
            document.getElementById('location').value = '';
            document.getElementById('purpose').value = '';
            document.getElementById('appointmentModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('appointmentModal').style.display = 'none';
        }

        function editAppointment(appt) {
            editing = true;
            document.getElementById('formTitle').innerText = 'Edit Appointment';
            document.getElementById('appointmentId').value = appt.id;
            document.getElementById('doctor').value = appt.doctor;
            document.getElementById('hospital').value = appt.hospital;
            document.getElementById('date').value = appt.date;
            document.getElementById('time').value = appt.time;
            document.getElementById('location').value = appt.location;
            document.getElementById('purpose').value = appt.purpose;
            document.getElementById('appointmentModal').style.display = 'flex';
        }

        async function saveAppointment() {
            const appointmentData = {
                id: document.getElementById('appointmentId').value,
                doctor: document.getElementById('doctor').value,
                hospital: document.getElementById('hospital').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                location: document.getElementById('location').value,
                purpose: document.getElementById('purpose').value
            };

            if (!appointmentData.doctor || !appointmentData.hospital || !appointmentData.date || !appointmentData.time) {
                alert('Please fill doctor, hospital, date and time');
                return;
            }

            if (editing) {
                await fetch('/update_appointment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(appointmentData)
                });
            } else {
                await fetch('/add_appointment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(appointmentData)
                });
            }

            closeModal();
            loadAppointments();
        }

        async function deleteAppointment(id) {
            if (!confirm('Delete this appointment?')) return;

            await fetch(`/delete_appointment/${id}`, {
                method: 'DELETE'
            });
            loadAppointments();
        }

        loadAppointments();
    </script>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
