<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            min-height: 100vh;
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.35);
            padding: 30px 20px 50px;
        }

        .container {
            max-width: 1250px;
            margin: auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 24px;
        }

        .title h1 {
            margin: 0;
            font-size: 34px;
        }

        .title p {
            margin: 8px 0 0 0;
            color: #d1d5db;
        }

        .back-btn {
            text-decoration: none;
            background: #111827;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #1f2937;
        }

        .table-wrap {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.20);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.08);
            color: #f8fafc;
        }

        td {
            color: #e5e7eb;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        .empty {
            padding: 20px;
            color: #d1d5db;
        }

        @media (max-width: 768px) {
            .title h1 {
                font-size: 28px;
            }

            th, td {
                font-size: 14px;
                padding: 12px;
            }

            .delete-btn {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <div class="topbar">
                <div class="title">
                    <h1>Manage Users</h1>
                    <p>View and remove registered users</p>
                </div>
                <a class="back-btn" href="/admin/dashboard">← Back to Dashboard</a>
            </div>

            <div class="table-wrap">
                {% if users %}
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Created At</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr id="user-row-{{ user['id'] }}">
                            <td>{{ user["id"] }}</td>
                            <td>{{ user["full_name"] }}</td>
                            <td>{{ user["email"] }}</td>
                            <td>{{ user["created_at"] }}</td>
                            <td>
                                <button class="delete-btn" data-id="{{ user.id }}" onclick="deleteUser(this.dataset.id)">
  Delete
</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <div class="empty">No users found.</div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        async function deleteUser(userId) {
            const confirmed = confirm("Are you sure you want to delete this user?");
            if (!confirmed) return;

            const response = await fetch(`/admin/delete_user/${userId}`, {
                method: "DELETE"
            });

            const result = await response.json();

            if (result.status === "success") {
                const row = document.getElementById(`user-row-${userId}`);
                if (row) row.remove();
                alert("User deleted successfully.");
            } else {
                alert("Failed to delete user.");
            }
        }
    </script>
</body>
</html>
