<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Requests</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin_theme.css') }}">
</head>
<body>
    <div class="admin-overlay">
        <div class="admin-container">
            <div class="admin-topbar">
                <div class="admin-title">
                    <h1>Admin Requests</h1>
                    <p>User support and request messages.</p>
                </div>
                <div class="admin-actions">
                    <a class="admin-btn" href="/admin/dashboard">&#8592; Back to Dashboard</a>
                </div>
            </div>

            <div class="list-stack">
                {% if requests_list %}
                    {% for req in requests_list %}
                    <section class="list-section">
                        <h2>{{ req.name }}</h2>
                        <div class="list-item"><strong>Request Type:</strong> {{ req.type }}</div>
                        <div class="list-item"><strong>Message:</strong> {{ req.message }}</div>
                        <div class="list-item"><strong>Status:</strong> {{ req.status }}</div>
                    </section>
                    {% endfor %}
                {% else %}
                    <section class="list-section">
                        <div class="empty-state">No requests found.</div>
                    </section>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
