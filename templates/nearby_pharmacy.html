<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Pharmacy</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            min-height: 100vh;
            color: white;
            transition: background 0.35s ease, color 0.35s ease;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page-wrapper {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.30);
            padding: 30px 20px;
            transition: background 0.35s ease;
        }

        .page-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.30);
            padding: 24px;
            transition: background 0.35s ease, border 0.35s ease, box-shadow 0.35s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .top-bar h1 {
            margin: 0;
            font-size: 38px;
            font-weight: bold;
            color: white;
            flex: 1;
            text-align: center;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }

        .primary {
            background: #14b8a6;
            color: white;
        }

        .primary:hover {
            background: #0f9f90;
        }

        .secondary {
            background: #111827;
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .secondary:hover {
            background: #1f2937;
        }

        .status {
            margin-bottom: 18px;
            font-weight: bold;
            font-size: 20px;
            color: #dbe4ee;
        }

        #map {
            height: 500px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 22px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.10);
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 22px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 8px 25px rgba(0,0,0,0.20);
            transition: background 0.35s ease, border 0.35s ease, box-shadow 0.35s ease;
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 28px;
            color: white;
        }

        .card p {
            margin: 10px 0;
            font-size: 18px;
            color: #dbe4ee;
            line-height: 1.5;
        }

        .map-link {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #5eead4;
            font-weight: bold;
            font-size: 17px;
        }

        .map-link:hover {
            text-decoration: underline;
        }

        /* LIGHT MODE */
        body.light-mode {
            background: linear-gradient(135deg, #f8fafc, #e2e8f0, #ffffff);
            background-size: 300% 300%;
            color: #111827;
        }

        body.light-mode .page-wrapper {
            background: rgba(255, 255, 255, 0.40);
        }

        body.light-mode .page-container {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.10);
        }

        body.light-mode .top-bar h1,
        body.light-mode .status {
            color: #111827;
        }

        body.light-mode .secondary {
            background: #e2e8f0;
            color: #111827;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        body.light-mode .secondary:hover {
            background: #cbd5e1;
        }

        body.light-mode #map {
            border: 1px solid rgba(15, 23, 42, 0.10);
        }

        body.light-mode .card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
        }

        body.light-mode .card h3,
        body.light-mode .card p {
            color: #111827;
        }

        body.light-mode .map-link {
            color: #0f766e;
        }

        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .top-bar h1 {
                font-size: 28px;
                text-align: center;
            }

            .status {
                font-size: 18px;
            }

            #map {
                height: 380px;
            }

            .card h3 {
                font-size: 24px;
            }

            .card p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="page-container">

            <div class="top-bar">
                <a href="/dashboard" class="btn secondary">← Back</a>
                <h1>Nearby Pharmacy</h1>
                <button class="btn primary" onclick="findNearbyPharmacies()">Use My Location</button>
            </div>

            <div id="status" class="status">Click "Use My Location" to find nearby pharmacies.</div>
            <div id="map"></div>
            <div id="results"></div>

        </div>
    </div>

    <script>
        let map = L.map('map').setView([20.5937, 78.9629], 5);
        let markers = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function clearMarkers() {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
        }

        async function findNearbyPharmacies() {
            const status = document.getElementById("status");
            const results = document.getElementById("results");

            results.innerHTML = "";
            clearMarkers();
            status.innerText = "Requesting location access...";

            if (!navigator.geolocation) {
                status.innerText = "Geolocation is not supported in this browser.";
                return;
            }

            navigator.geolocation.getCurrentPosition(async function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                map.setView([lat, lon], 14);

                const userMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup("You are here")
                    .openPopup();
                markers.push(userMarker);

                status.innerText = "Searching nearby pharmacies...";

                try {
                    const response = await fetch("/api/nearby_pharmacy", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ lat, lon })
                    });

                    const data = await response.json();

                    if (!data.length) {
                        status.innerText = "No nearby pharmacies found.";
                        return;
                    }

                    status.innerText = "Nearby pharmacies found:";

                    data.forEach(item => {
                        const marker = L.marker([item.lat, item.lon]).addTo(map)
                            .bindPopup(`<b>${item.name}</b><br>${item.location}<br>${item.distance_km} km away`);
                        markers.push(marker);

                        const card = document.createElement("div");
                        card.className = "card";
                        card.innerHTML = `
                            <h3>${item.name}</h3>
                            <p><strong>Location:</strong> ${item.location}</p>
                            <p><strong>Distance:</strong> ${item.distance_km} km</p>
                            <p><strong>Timings:</strong> ${item.timings}</p>
                            <p><strong>Rating:</strong> ${item.rating}</p>
                            <p><strong>Phone:</strong> ${item.phone}</p>
                            <p><strong>Services:</strong> ${item.services.join(", ")}</p>
                            <a class="map-link" target="_blank" href="https://www.google.com/maps?q=${item.lat},${item.lon}">Open in Maps</a>
                        `;
                        results.appendChild(card);
                    });
                } catch (error) {
                    status.innerText = "Error while searching nearby pharmacies.";
                }
            }, function(error) {
                status.innerText = "Location permission denied or unavailable.";
            });
        }
    </script>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
