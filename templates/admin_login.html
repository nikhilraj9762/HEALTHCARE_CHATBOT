<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 34px 30px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.30);
        }

        .admin-badge {
            width: 72px;
            height: 72px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.12);
        }

        h2 {
            text-align: center;
            margin: 0 0 8px 0;
            font-size: 30px;
        }

        .subtitle {
            text-align: center;
            color: #d1d5db;
            margin-bottom: 24px;
            font-size: 15px;
        }

        .flash {
            text-align: center;
            color: #fecaca;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 14px;
            color: #e5e7eb;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            font-size: 15px;
        }

        input::placeholder {
            color: #cbd5e1;
        }

        input:focus {
            border-color: #5eead4;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: linear-gradient(135deg, #14b8a6, #0f766e);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            font-weight: bold;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(20, 184, 166, 0.25);
        }

        .link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #d1d5db;
        }

        .link a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: bold;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="admin-badge">🛡️</div>
        <h2>Admin Login</h2>
        <div class="subtitle">Secure access to healthcare admin controls</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Admin email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button class="login-btn" type="submit">Login to Admin Panel</button>
        </form>

        <div class="link">
            <a href="/login">← Back to User Login</a>
        </div>
    </div>
</body>
</html>
